<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://img.icons8.com/?size=96&id=DYoTRhf8VVC1&format=png">
<title>Enterprise Resume Platform</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary:#2563eb;
    --secondary:#06b6d4;
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --error:#ef4444;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b
    );
    padding:20px;
}

/* Background decorations */

body::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#2563eb44;
    border-radius:50%;
    left:-100px;
    top:-100px;
    filter:blur(80px);
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#06b6d444;
    border-radius:50%;
    right:-100px;
    bottom:-100px;
    filter:blur(80px);
}

/* Card */

.home-page{
    position:relative;
    z-index:2;

    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.12);

    border-radius:24px;

    padding:35px;

    text-align:center;

    box-shadow:
    0 20px 40px rgba(0,0,0,.35);
}

/* Icon */

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:20px;

    border-radius:20px;

    background:
    linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:2rem;
}

.home-page h2{
    color:white;
    font-size:1.8rem;
    margin-bottom:8px;
}

.subtitle{
    color:var(--muted);
    font-size:.95rem;
    margin-bottom:30px;
}

.access-id-box{
    text-align:left;
}

.access-id-box label{
    color:white;
    font-weight:500;
    display:block;
    margin-bottom:8px;
}

.access-id-box input{
    width:100%;
    padding:14px;

    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);

    background:#0f172a;

    color:white;
    font-size:15px;
}

.access-id-box input:focus{
    outline:none;
    border-color:var(--secondary);
}

.access-id-box button{
    width:100%;
    margin-top:18px;

    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:white;
    font-weight:600;
    font-size:15px;

    background:
    linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );

    transition:.3s;
}

.access-id-box button:hover{
    transform:translateY(-2px);
}

.error{
    display:none;

    margin-top:15px;

    padding:12px;

    border-radius:10px;

    background:rgba(239,68,68,.15);

    border:1px solid rgba(239,68,68,.4);

    color:#fecaca;

    font-size:.95rem;
}

.footer-text{
    margin-top:25px;
    color:var(--muted);
    font-size:.85rem;
    text-align:center;
}

/* Mobile */

@media(max-width:480px){

    .home-page{
        padding:25px;
    }

    .home-page h2{
        font-size:1.5rem;
    }

    .subtitle{
        font-size:.85rem;
    }

    .logo{
        width:70px;
        height:70px;
        font-size:1.8rem;
    }
}

</style>
</head>

<body>

<div class="home-page">

    <div class="logo">
        <img src="https://img.icons8.com/?size=96&id=DYoTRhf8VVC1&format=png" alt="Logo" width="50" height="50">
    </div>

    <h2>Enterprise Career Success Platform</h2>

 

    <div class="access-id-box">

        <label for="accessId">
            Access ID
        </label>

        <input
        type="password"
        id="accessId"
        placeholder="Enter your Access ID">

        <button onclick="validateId()">
            Continue
        </button>

        <div id="errorMsg" class="error">
            Invalid Access ID. Please verify your credentials and try again.
        </div>

    </div>

    <div class="footer-text">
        Enterprise Career Success Platform • Secure Access
    </div>

</div>

<script>

const input =
document.getElementById('accessId');

input.addEventListener('keypress',function(e){

    if(e.key === 'Enter'){
        validateId();
    }

});

function validateId(){

    const accessId =
    document.getElementById('accessId').value;

    const error =
    document.getElementById('errorMsg');

    if(accessId === "333@86"){

        error.style.display = "none";

        window.location.href =
        "Templates.html";

    }

    else{

        error.style.display = "block";

        input.style.borderColor =
        "#ef4444";

        input.value = "";

        input.focus();
    }
}

</script>

</body>
</html>
