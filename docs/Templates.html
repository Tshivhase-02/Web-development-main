<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" type="image/png" href="https://tse1.mm.bing.net/th/id/OIP.9x0bbl0uQKM2vwy_eG9OWgHaHa?w=512&h=512">
<title>Choose CV Template</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f3f6fb;
    min-height:100vh;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:50px;
    color:#1f2937;
}

.templates{
    max-width:1000px;
    margin:auto;
}

.top{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:30px;
}

.bottom{
    display:flex;
    justify-content:center;
}

.card{
    width:320px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.preview{
    height:220px;
    background:linear-gradient(
        135deg,
        #4f46e5,
        #2563eb
    );
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:24px;
    font-weight:bold;
}

.content{
    padding:20px;
    text-align:center;
}

.content p{
    color:#666;
    margin:10px 0 20px;
}

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#1e40af;
}

/* Mobile */
@media(max-width:768px){

    .top{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:100%;
        max-width:350px;
    }
}
</style>

</head>
<body>

<h1>Choose Your CV Template</h1>

<div class="templates">

    <div class="top">




        <div class="card">
            <div class="preview">
                Professional
            </div>

            <div class="content">
                <h2>Professional CV</h2>
                <p>Formal corporate design suitable for jobs.</p>

              <a href="Professional.html">  <button class="btn">Select</button></a>
            </div>
        </div>




        <div class="card">
            <div class="preview" style="
            background:linear-gradient(
            135deg,#10b981,#059669);">
                Modern
            </div>

            <div class="content">
                <h2>Modern CV</h2>
                <p>Stylish layout with clean sections.</p>
                <a href="Modern.html">  <button class="btn">Select</button></a>
            </div>
        </div>

    </div>
         


    <div class="bottom">  
        <div class="card">
            <div class="preview" style="
            background:linear-gradient(
            135deg,#f97316,#ea580c);">
                Traditional
            </div>

            <div class="content"></a>
                <h2>Traditional CV</h2>
                <p>Classic layout used by many employers.</p>
            


<a href="Traditional.html">  <button class="btn">Select</button></a>



            
            </div>

        </div>

    </a></div>

</div>

</body>

</html>
